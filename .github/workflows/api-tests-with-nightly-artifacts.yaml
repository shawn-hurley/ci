name: API Tests with Last Nightly Artifacts

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch that was used for the nightly build'
        required: false
        type: string
        default: 'main'
  schedule:
    # Run daily after nightly builds typically complete
    - cron: '0 8 * * *'  # 8 AM UTC

jobs:
  test-e2e-hub-api:
    runs-on: ubuntu-latest
    steps:
      # Download artifacts from the last successful nightly build
      - name: Download artifacts from last nightly build
        id: download-artifacts
        uses: shawn-hurley/ci/download-last-artifacts@main
        with:
          branch: ${{ github.base_ref || github.ref }}
          path: '/tmp/nightly-artifacts'

      - name: Start kind cluster
        id: kind-cluster
        uses: helm/kind-action@v1

      - name: Load images into kind
        env:
          ARTIFACTS_PATH: ${{ steps.download-artifacts.outputs.artifacts-path }}
        run: |
          echo "Loading container images from $ARTIFACTS_PATH into kind cluster..."

          # Find and load all tar files (container images)
          for image_tar in $(find "${ARTIFACTS_PATH}" -type f -name "*.tar"); do
            echo "Loading image: ${image_tar}"
            kind load image-archive "${image_tar}"
            rm "${image_tar}"
          done

          echo "Images loaded successfully"
          docker exec -it kind-control-plane crictl images

      # TODO: Install operator and run API tests
      - name: Install konveyor operator
        run: |
          echo "Install operator with images from nightly build"
          # Add your operator installation steps here

      - name: Run API tests
        run: |
          echo "Running API tests"
          # Add your API test steps here

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: test-results/
