name: Konveyor e2e nightly

  workflow_call:
    inputs:
      branch:
        description: |
          The branch that should be used to pull all konveyor related repos.
          For example, if you wanted to set a nightly build for release-0.8, you would specify
          "release-0.8".
        required: false
        type: string
        default: main
  workflow_dispatch:
    inputs:
      branch:
        description: |
          The branch that should be used to pull all konveyor related repos.
          For example, if you wanted to set a nightly build for release-0.8, you would specify
          "release-0.8".
        required: false
        type: string
        default: main 

jobs:
  prepare-level0-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
    steps:
      - name: Checkout ci repo
        uses: actions/checkout@v5
        with:
          repository: shawn-hurley/ci
          ref: main

      - name: Prepare level 0 matrix
        id: prepare
        shell: bash
        run: |
          # Install yq for YAML parsing
          curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /tmp/yq
          chmod +x /tmp/yq

          # Read the config file and replace BRANCH_PLACEHOLDER with actual branch
          config=$(/tmp/yq eval '.config' .github/workflows/nightly-matrix-config.yaml -o=json | sed "s/BRANCH_PLACEHOLDER/${{ inputs.branch }}/g")

          {
            echo "matrix<<EOF"
            echo "{\"config\":$config}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  build-images:
    needs: prepare-level0-matrix
    uses: ./.github/workflows/build-nightly-images.yaml
    with:
      matrix-config: ${{ needs.prepare-level0-matrix.outputs.matrix }}
      branch: ${{ inputs.branch }}

  prepare-level1-matrix:
    needs: build-images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      has-jobs: ${{ steps.prepare.outputs.has-jobs }}
    steps:
      - name: Prepare level 1 matrix
        id: prepare
        shell: bash
        run: |
          # Get dependent jobs from the previous job output
          dependent_jobs='${{ needs.build-images.outputs.dependent-jobs }}'

          if [ -z "$dependent_jobs" ] || [ "$dependent_jobs" = "null" ] || [ "$dependent_jobs" = "" ]; then
            echo "has-jobs=false" >> $GITHUB_OUTPUT
            {
              echo "matrix<<EOF"
              echo "{\"config\":[]}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has-jobs=true" >> $GITHUB_OUTPUT
            {
              echo "matrix<<EOF"
              echo "{\"config\":$dependent_jobs}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

  build-level1-images:
    needs: prepare-level1-matrix
    if: needs.prepare-level1-matrix.outputs.has-jobs == 'true'
    uses: ./.github/workflows/build-nightly-images.yaml
    with:
      matrix-config: ${{ needs.prepare-level1-matrix.outputs.matrix }}
      branch: ${{ inputs.branch }}

  prepare-level2-matrix:
    needs: build-level1-images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      has-jobs: ${{ steps.prepare.outputs.has-jobs }}
    steps:
      - name: Prepare level 2 matrix
        id: prepare
        shell: bash
        run: |
          # Get dependent jobs from the previous job output
          dependent_jobs='${{ needs.build-level1-images.outputs.dependent-jobs }}'

          if [ -z "$dependent_jobs" ] || [ "$dependent_jobs" = "null" ] || [ "$dependent_jobs" = "" ]; then
            echo "has-jobs=false" >> $GITHUB_OUTPUT
            {
              echo "matrix<<EOF"
              echo "{\"config\":[]}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "has-jobs=true" >> $GITHUB_OUTPUT
            {
              echo "matrix<<EOF"
              echo "{\"config\":$dependent_jobs}"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

  build-level2-images:
    needs: prepare-level2-matrix
    if: needs.prepare-level2-matrix.outputs.has-jobs == 'true'
    uses: ./.github/workflows/build-nightly-images.yaml
    with:
      matrix-config: ${{ needs.prepare-level2-matrix.outputs.matrix }}
      branch: ${{ inputs.branch }}


  # Now that all the images are built, we need to build the operator image.
